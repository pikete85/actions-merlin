name: Run Pylint

on:
  push:
    branches: [ "main" ]

jobs:
  pylint:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pylint

      - name: Ejecutar Pylint
        run: |
          echo "Buscando archivos Python..."
          FILES=$(find . -name "*.py")

          if [ -z "$FILES" ]; then
            echo "No hay archivos Python para analizar"
            exit 0
          fi

          pylint $FILES
